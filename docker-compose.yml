services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mathapp
      POSTGRES_USER: mathapp
      POSTGRES_PASSWORD: mathapp_secret
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mathapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://mathapp:mathapp_secret@db:5432/mathapp
      JWT_SECRET: change_this_in_production
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: