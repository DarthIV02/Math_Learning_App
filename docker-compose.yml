services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mathapp
      POSTGRES_USER: mathapp
      POSTGRES_PASSWORD: mathapp_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/db/seeds/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
      - ./backend/db/seeds/seed-assessment.sql:/docker-entrypoint-initdb.d/03-seed-assessment.sql
      - ./backend/db/seeds/gsm8k-cache.sql:/docker-entrypoint-initdb.d/04-seed-gsm8k.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mathapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    expose:
      - "3001"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "3002:80"
    depends_on:
      - backend

volumes:
  pgdata: